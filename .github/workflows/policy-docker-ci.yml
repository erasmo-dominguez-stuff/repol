name: Policy Docker CI

on:
  push:
    branches: [main]
    paths:
      - 'policies/**'
      - '.repol/**'
      - 'infra/local/**'
      - 'infra/integration/**'
      - 'src/**'
  pull_request:
    paths:
      - 'policies/**'
      - '.repol/**'
      - 'infra/local/**'
      - 'infra/integration/**'
      - 'src/**'

jobs:
  # ── Standalone OPA runner image ─────────────────────────────────────────────
  opa-runner:
    name: OPA Runner Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build OPA runner image
        run: docker build -t policy-opa -f infra/local/Dockerfile.opa .

      - name: Run OPA unit tests
        run: docker run --rm policy-opa test /policies -v --ignore "*.json"

      - name: Evaluate deploy — valid (expect allow=true)
        run: |
          RESULT=$(docker run --rm -i policy-opa eval \
            --data /policies --input /dev/stdin --format json \
            "data.github.deploy.allow" < infra/local/payloads/deploy_valid.json)
          echo "$RESULT"
          ALLOW=$(echo "$RESULT" | jq -r '.result[0].expressions[0].value')
          [ "$ALLOW" = "true" ] || { echo "::error::Expected allow=true"; exit 1; }

      - name: Evaluate deploy — denied (expect allow=false)
        run: |
          RESULT=$(docker run --rm -i policy-opa eval \
            --data /policies --input /dev/stdin --format json \
            "data.github.deploy.allow" < infra/local/payloads/deploy_denied.json)
          echo "$RESULT"
          ALLOW=$(echo "$RESULT" | jq -r '.result[0].expressions[0].value')
          [ "$ALLOW" = "false" ] || { echo "::error::Expected allow=false"; exit 1; }

      - name: Evaluate PR — valid (expect allow=true)
        run: |
          RESULT=$(docker run --rm -i policy-opa eval \
            --data /policies --input /dev/stdin --format json \
            "data.github.pullrequest.allow" < infra/local/payloads/pr_valid.json)
          echo "$RESULT"
          ALLOW=$(echo "$RESULT" | jq -r '.result[0].expressions[0].value')
          [ "$ALLOW" = "true" ] || { echo "::error::Expected allow=true"; exit 1; }

      - name: Evaluate PR — denied (expect allow=false)
        run: |
          RESULT=$(docker run --rm -i policy-opa eval \
            --data /policies --input /dev/stdin --format json \
            "data.github.pullrequest.allow" < infra/local/payloads/pr_denied.json)
          echo "$RESULT"
          ALLOW=$(echo "$RESULT" | jq -r '.result[0].expressions[0].value')
          [ "$ALLOW" = "false" ] || { echo "::error::Expected allow=false"; exit 1; }

  # ── Full integration (docker compose) ───────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose -f infra/local/docker-compose.yml up -d --build

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/health > /dev/null 2>&1 && break
            sleep 1
          done

      - name: Run integration tests
        run: ./infra/local/scripts/test.sh

      - name: Stop services
        if: always()
        run: docker compose -f infra/local/docker-compose.yml down
