services:
  opa:
    image: openpolicyagent/opa:latest
    command: ["run", "--server", "--addr", ":8181", "--log-level", "info", "/policies"]
    ports:
      - "8181:8181"
    volumes:
      - ../../policies:/policies:ro

  server:
    build:
      context: ../server
    ports:
      - "8080:8080"
    environment:
      OPA_URL: http://opa:8181
      REPOL_DIR: /repol
      AUDIT_DB: /data/audit.db
    volumes:
      - ../../.repol:/repol:ro
      - audit-data:/data
    depends_on:
      - opa

volumes:
  audit-data:
