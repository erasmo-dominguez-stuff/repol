services:
  opa:
    image: openpolicyagent/opa:latest
    command: ["run", "--server", "--addr", ":8181", "--log-level", "info", "/policies"]
    ports:
      - "8181:8181"
    volumes:
      - ../../policies:/policies:ro

  server:
    build:
      context: ../server
    ports:
      - "8080:8080"
    environment:
      OPA_URL: http://opa:8181
      REPOL_DIR: /repol
      AUDIT_DB: /data/audit.db
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_APP_PRIVATE_KEY_PATH: /secrets/app.pem
      PR_FORCE_APPROVERS: ${PR_FORCE_APPROVERS:-}
    volumes:
      - ../../.repol:/repol:ro
      - audit-data:/data
      - ${GITHUB_APP_PRIVATE_KEY_FILE:-/dev/null}:/secrets/app.pem:ro
    depends_on:
      - opa

  smee:
    build:
      context: ../smee
    environment:
      SMEE_URL: ${SMEE_URL:-}
      SMEE_TARGET: http://server:8080/webhook
    depends_on:
      - server
    restart: unless-stopped

volumes:
  audit-data:
