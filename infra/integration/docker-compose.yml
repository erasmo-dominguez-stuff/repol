services:
  opa:
    image: openpolicyagent/opa:latest
    command: ["run", "--server", "--addr", ":8181", "--log-level", "info", "/policies"]
    ports:
      - "8181:8181"
    volumes:
      - ../../policies:/policies:ro

  server:
    build:
      context: ../server
    ports:
      - "8080:8080"
    environment:
      OPA_URL: http://opa:8181
      REPOL_DIR: /repol
      AUDIT_DB: /data/audit.db
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY_PATH: ${GITHUB_APP_PRIVATE_KEY_PATH:-/secrets/app.pem}
    volumes:
      - ../../.repol:/repol:ro
      - audit-data:/data
      - ${GITHUB_APP_PRIVATE_KEY_FILE:-/dev/null}:/secrets/app.pem:ro
    depends_on:
      - opa

  smee:
    image: node:20-slim
    command:
      [
        "npx",
        "--yes",
        "smee-client",
        "--url",
        "${SMEE_URL}",
        "--target",
        "http://server:8080/webhook",
      ]
    depends_on:
      - server
    restart: unless-stopped

volumes:
  audit-data:
