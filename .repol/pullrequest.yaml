# gitpoli – Pull Request Policy Configuration
# This file is placed in .repol/ of each repository that adopts gitpoli.
# Teams edit this YAML to define PR validation rules.

policy:
  version: "1.0"

  # Branch naming convention (source → target).
  # PRs that don't match any rule are denied.
  branch_rules:
  - source: "feature/*"
    target: "develop"
  - source: "feature/*"
    target: "main"
  - source: "bugfix/*"
    target: "develop"
  - source: "bugfix/*"
    target: "main"
  - source: "hotfix/*"
    target: "main"
  - source: "hotfix/*"
    target: "release/*"
  - source: "release/*"
    target: "main"
  - source: "develop"
    target: "main"
  # Global rules that apply to all PRs.
  rules:
    allowed_target_branches:
    - main
    - develop
    approvals_required: 1
    signed_off: false
